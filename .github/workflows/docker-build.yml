name: Docker build

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      # Build only (no push). If this fails, the PR breaks container builds.
      - name: Build Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: openclaw-railway-template:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Run container and hit /healthz (same env/volume pattern as Railway and WSL smoke).
      - name: Run container and smoke /healthz
        run: |
          mkdir -p .tmpdata .tmpdata/.openclaw
          cp test/fixtures/ci-openclaw.json .tmpdata/.openclaw/openclaw.json
          docker run --rm -d -p 8080:8080 \
            -e PORT=8080 \
            -e SETUP_PASSWORD=test \
            -e OPENCLAW_GATEWAY_TOKEN=ci-test-token \
            -e OPENCLAW_STATE_DIR=/data/.openclaw \
            -e OPENCLAW_WORKSPACE_DIR=/data/workspace \
            -v "$(pwd)/.tmpdata:/data" \
            --name clawdbot-ci \
            openclaw-railway-template:ci
          echo "Waiting for server..."
          for i in $(seq 1 24); do
            if curl -sf http://localhost:8080/healthz >/dev/null; then break; fi
            if [ "$i" -eq 24 ]; then echo "Timeout waiting for /healthz"; docker logs clawdbot-ci; exit 1; fi
            sleep 5
          done
          curl -sf http://localhost:8080/healthz && echo " /healthz OK"
          curl -sf -u ":test" http://localhost:8080/setup/healthz && echo " /setup/healthz OK"
          docker stop clawdbot-ci

      # Validate gateway startup: pre-seeded config triggers gateway; verify Control UI proxy.
      - name: Run container and validate gateway + Control UI
        run: |
          mkdir -p .tmpdata
          rm -rf .tmpdata/.openclaw .tmpdata/workspace
          mkdir -p .tmpdata/.openclaw .tmpdata/workspace
          cp test/fixtures/ci-openclaw.json .tmpdata/.openclaw/openclaw.json
          docker run --rm -d -p 8080:8080 \
            -e PORT=8080 \
            -e SETUP_PASSWORD=test \
            -e OPENCLAW_GATEWAY_TOKEN=ci-test-token \
            -e OPENCLAW_STATE_DIR=/data/.openclaw \
            -e OPENCLAW_WORKSPACE_DIR=/data/workspace \
            -v "$(pwd)/.tmpdata:/data" \
            --name clawdbot-ci-gateway \
            openclaw-railway-template:ci
          echo "Waiting for gateway and Control UI..."
          for i in $(seq 1 36); do
            if curl -sf -u ":test" http://localhost:8080/openclaw >/dev/null 2>&1; then break; fi
            if [ "$i" -eq 36 ]; then
              echo "Timeout waiting for /openclaw"; docker logs clawdbot-ci-gateway; exit 1
            fi
            sleep 5
          done
          curl -sf -u ":test" http://localhost:8080/openclaw >/dev/null && echo " /openclaw (gateway proxy) OK"
          docker stop clawdbot-ci-gateway
